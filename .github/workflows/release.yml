name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Get version info
        id: version
        run: |
          echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          echo "commit=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "date=$(date -u '+%Y-%m-%d %H:%M:%S')" >> "$GITHUB_OUTPUT"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          VERSION: ${{ steps.version.outputs.version }}
          BUILD_DATE: ${{ steps.version.outputs.date }}
          GIT_COMMIT: ${{ steps.version.outputs.commit }}
        run: |
          LDFLAGS="-s -w"
          LDFLAGS="$LDFLAGS -X 'github.com/kavinkumar999/kite-cli/cmd.Version=$VERSION'"
          LDFLAGS="$LDFLAGS -X 'github.com/kavinkumar999/kite-cli/cmd.BuildTime=$BUILD_DATE'"
          LDFLAGS="$LDFLAGS -X 'github.com/kavinkumar999/kite-cli/cmd.GitCommit=$GIT_COMMIT'"
          go build -ldflags="$LDFLAGS" -o kite .
          tar -czvf "kite_${GOOS}_${GOARCH}.tar.gz" kite

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: kite_${{ matrix.goos }}_${{ matrix.goarch }}
          path: kite_${{ matrix.goos }}_${{ matrix.goarch }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.tar.gz
          generate_release_notes: true
